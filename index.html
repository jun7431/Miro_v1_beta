<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kandid Spot — One local route, ready to walk</title>
<meta name="description" content="Pick your area, time, and vibe. Kandid Spot gives you one route from curated local spots in Seoul." />
<meta name="theme-color" content="#FBF7EF" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #FBF7EF;
    --card: #FFFFFF;
    --primary: #2563EB;
    --primary-dark: #1D4ED8;
    --primary-soft: #EFF6FF;
    --mint: #14B8A6;
    --mint-soft: #CCFBF1;
    --text: #111827;
    --text-soft: #1F2937;
    --gray: #6B7280;
    --gray-light: #9CA3AF;
    --border: #E5E7EB;
    --shadow-pop: 0 16px 36px -10px rgba(37, 99, 235, 0.35);
    --shadow-xs: 0 1px 2px rgba(17, 24, 39, 0.04);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
      "Malgun Gothic", "Noto Sans KR", sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 88% 10%, rgba(20, 184, 166, 0.10), transparent 55%),
      radial-gradient(circle at 8% 92%, rgba(37, 99, 235, 0.08), transparent 55%);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    letter-spacing: -0.005em;
    min-height: 100%;
    display: flex;
    flex-direction: column;
  }
  a { color: inherit; text-decoration: none; }

  .start {
    flex: 1;
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    padding: 56px 24px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 36px;
  }
  .brand-mark {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    background: var(--primary-soft);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-xs);
  }
  .brand-mark::after {
    content: "";
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--primary);
  }
  .brand-name {
    font-size: 19px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text-soft);
    background: var(--card);
    border: 1px solid var(--border);
    padding: 6px 12px 6px 10px;
    border-radius: 999px;
    box-shadow: var(--shadow-xs);
    margin-bottom: 22px;
  }
  .eyebrow-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--mint);
    box-shadow: 0 0 0 4px var(--mint-soft);
  }

  h1.headline {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.05;
    color: var(--text);
    max-width: 14ch;
  }
  h1.headline .accent {
    background: linear-gradient(120deg, var(--primary) 0%, var(--mint) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .lead {
    margin-top: 16px;
    font-size: 15.5px;
    color: var(--gray);
    line-height: 1.55;
    max-width: 38ch;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 32px;
    padding: 16px 32px;
    min-width: 220px;
    background: var(--primary);
    color: white;
    font-size: 16px;
    font-weight: 700;
    border-radius: 14px;
    border: none;
    box-shadow: var(--shadow-pop);
    transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
  }
  .cta:hover {
    background: var(--primary-dark);
    transform: translateY(-1px);
    box-shadow: 0 20px 40px -10px rgba(37, 99, 235, 0.45);
  }
  .cta:active { transform: translateY(0); }
  .cta:focus-visible {
    outline: 3px solid rgba(37, 99, 235, 0.35);
    outline-offset: 2px;
  }
  .cta-arrow { font-size: 17px; line-height: 1; }

  .trust {
    margin-top: 22px;
    font-size: 12.5px;
    color: var(--gray);
    letter-spacing: 0.01em;
  }
  .trust .sep {
    display: inline-block;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--gray-light);
    vertical-align: middle;
    margin: 0 8px 2px;
  }

  .prototype-note {
    margin-top: 14px;
    font-size: 11.5px;
    color: var(--gray-light);
    font-weight: 500;
  }

  .foot {
    flex-shrink: 0;
    text-align: center;
    padding: 20px 24px 28px;
    font-size: 11px;
    color: var(--gray-light);
    letter-spacing: 0.04em;
  }

  @media (max-width: 480px) {
    .start { padding: 40px 20px 28px; }
    .brand { margin-bottom: 28px; }
    h1.headline { font-size: 32px; }
    .lead { font-size: 14.5px; margin-top: 12px; }
    .cta { width: 100%; min-width: 0; padding: 15px 24px; }
    .trust { font-size: 12px; }
  }
</style>
</head>
<body>

<main class="start">
  <a class="brand" href="./v2-refined-main-app/index.html" aria-label="Kandid Spot home">
    <span class="brand-mark" aria-hidden="true"></span>
    <span class="brand-name">Kandid Spot</span>
  </a>

  <span class="eyebrow">
    <span class="eyebrow-dot" aria-hidden="true"></span>
    Seoul · curated by locals
  </span>

  <h1 class="headline">
    One <span class="accent">local route</span>,<br />
    ready to walk.
  </h1>

  <p class="lead">
    Pick your area, time, and vibe. Get one route from curated local spots —
    no top-10 lists, no decision fatigue.
  </p>

  <a class="cta" href="./v2-refined-main-app/index.html" data-cta="start">
    Start <span class="cta-arrow" aria-hidden="true">→</span>
  </a>

  <p class="trust">
    Seoul
    <span class="sep" aria-hidden="true"></span>
    curated spots
    <span class="sep" aria-hidden="true"></span>
    no endless lists
  </p>

  <p class="prototype-note">No account needed for the prototype</p>
</main>

<footer class="foot">Made in Seoul · early access</footer>

</body>
</html>
